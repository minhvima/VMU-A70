<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VMU 70 Mobile Web</title>
    <meta
      name="description"
      content="Mini game web mobile cho sự kiện kỷ niệm VMU 70 năm."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="game-card">
        <header class="hero-panel">
          <div class="brand-row">
            <img class="brand-logo" src="./logo-70-main.png" alt="VMU 70 logo" />
            <div class="brand-copy">
              <p class="eyebrow">Mini Game Mobile</p>
              <h1>KỶ NIỆM VMU 70 NĂM</h1>
            </div>
            <img class="crest-logo" src="./Logo-Truong-Dai-Hoc-Hang-Hai.webp" alt="VMU crest" />
          </div>
          <div class="hero-note" id="heroNote">Chạm màn hình để bắt đầu...</div>
        </header>

        <section class="mission-panel">
          <div class="mission-strip" id="missionStrip"></div>
        </section>

        <section class="stage-card">
          <div class="stage-frame">
            <div class="stage-hud">
              <article class="hud-card">
                <span class="stat-label">Thời Gian</span>
                <strong class="stat-value" id="timerValue">03:00</strong>
              </article>
              <article class="hud-card hud-card-right">
                <span class="stat-label">Lượt Quăng</span>
                <strong class="stat-value" id="shotsValue">0</strong>
              </article>
            </div>

            <canvas id="gameCanvas" width="720" height="720"></canvas>

            <button class="fast-retract-button hidden" id="fastRetractButton" type="button">
              Thu Nhanh
            </button>
          </div>

          <div class="stage-footer">
            <div class="record-pill">Kỷ lục <strong id="bestValue">00:00</strong></div>
            <div class="legend-bar">
              <span class="legend-item"><span class="legend-dot target-dot"></span>Mục tiêu</span>
              <span class="legend-item"><span class="legend-dot mine-dot"></span>Thủy lôi</span>
              <span class="legend-item"><span class="legend-dot trap-dot"></span>Bẫy (-5s)</span>
            </div>
          </div>
        </section>

        <section class="action-card">
          <button class="primary-button" id="actionButton" type="button">Bắt Đầu</button>
          <button class="secondary-button" id="resetButton" type="button">Màn Chờ</button>
        </section>

        <section class="info-card compact">
          <p>
            Chạm sân chơi để tung neo, giữ <strong>Thu Nhanh</strong> khi neo rút về và thu đủ
            <strong>V - M - U - 70</strong>.
          </p>
        </section>

        <footer class="credit-bar">Phát triển bởi Phạm Trung Minh - Khoa CNTT</footer>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
